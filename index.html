<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解碼圖書館熱力圖——計算思維自學工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Screenshot Reminder Banner -->
<div class="screenshot-banner" id="screenshotBanner">
  <i class="fas fa-camera"></i>
  <span id="screenshotBannerText">完成每個互動後，請截圖保存到你的工作單！最後需提交工作單。</span>
  <i class="fas fa-camera"></i>
</div>

<!-- Navbar (dynamic, hidden on home page) -->
<nav class="navbar" id="navbar" style="display:none;">
  <div class="nav-title">
    <i class="fas fa-book-open-reader"></i>
    <span id="navTitle"></span>
  </div>
  <div class="nav-links" id="navLinks"></div>
</nav>

<!-- Main App Container -->
<main id="app">
  <div style="text-align:center;padding:60px 20px;">
    <i class="fas fa-spinner fa-spin" style="font-size:32px;color:var(--mid-blue, #3B82F6);"></i>
    <p style="margin-top:12px;color:#6B7280;">載入中…</p>
  </div>
</main>

<!-- Knowledge Overlay (shared across modules) -->
<div class="overlay" id="knowledgeOverlay">
  <div class="overlay-card">
    <h4><i class="fas fa-lightbulb" style="color:var(--warning-orange)"></i> <span id="knowledgeTitle"></span></h4>
    <p id="knowledgeContent" style="white-space:pre-line;"></p>
    <button class="btn btn-primary" onclick="closeKnowledge()">知道了！</button>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/router.js"></script>
</body>
</html>
