<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習工作單預覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* === Base variables === */
:root{--deep-blue:#1E3A8A;--light-blue:#DBEAFE;--mid-blue:#3B82F6;--success-green:#10B981;--warning-orange:#F59E0B;--danger-red:#EF4444;--bg:#F0F4F8;--card-bg:#FFFFFF;--text:#1F2937;--text-light:#6B7280;--shadow:0 4px 24px rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);--step-red:#EF4444;--step-amber:#F59E0B;--step-cyan:#0EA5E9;--step-pink:#EC4899;--step-purple:#8B5CF6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#E5E7EB;display:flex;justify-content:center;padding:16px}
.ws{width:210mm;background:white;box-shadow:0 2px 16px rgba(0,0,0,0.15)}

/* === Header === */
.ws-hd{background:linear-gradient(135deg,#1E3A8A,#3B82F6);padding:16px 20px;color:white;display:flex;justify-content:space-between;align-items:center}
.ws-hd h1{font-size:20px;font-weight:900}.ws-hd .sub{font-size:10px;opacity:0.8}
.meta{font-size:10px;text-align:right;background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:6px;line-height:1.6}
.ws-body{padding:12px 16px}

/* === Module blocks === */
.wm{margin-bottom:10px;page-break-inside:avoid;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden}
.wh{display:flex;align-items:center;gap:6px;padding:8px 12px;color:white;font-weight:700;font-size:12px}
.wh .tag{font-size:9px;background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:8px}
.wh .ct-tag{margin-left:auto;font-size:9px;background:rgba(0,0,0,0.12);padding:2px 6px;border-radius:8px}
.wb{padding:10px 12px}

/* === Labels & Text === */
.lbl{font-size:11px;color:#1E3A8A;font-weight:600;margin:6px 0 3px}.lbl:first-child{margin-top:2px}
.txt{font-size:12px;color:#374151;line-height:1.6;padding:8px 10px;background:#F9FAFB;border-radius:6px;margin-bottom:6px;white-space:pre-wrap}
.txt.em{color:#D1D5DB;font-style:italic}

/* === Vote buttons (module1) === */
.vote-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.vt{padding:8px 20px;border:2px solid #E5E7EB;border-radius:24px;font-size:13px;color:#6B7280}
.vt.sel{border-color:#EF4444;background:#FEF2F2;color:#B91C1C;font-weight:700}

/* === Sort (module1) === */
.sort{border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:8px}
.si{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;background:white}.si:last-child{border-bottom:none}
.sn{width:24px;height:24px;border-radius:50%;background:#1E3A8A;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* === Flow slots (module2) === */
.flow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.fs{padding:8px 12px;border:2px solid #3B82F6;border-radius:10px;font-size:11px;background:#DBEAFE;color:#1E3A8A;font-weight:600}
.fw{color:#9CA3AF;font-size:12px;flex-shrink:0}

/* === Match pairs (module3) === */
.mr{display:flex;align-items:center;gap:8px;margin-bottom:6px}.ml,.mrr{padding:8px 12px;border:2px solid;border-radius:8px;font-size:12px;flex:1}
.ml{text-align:right;background:#DBEAFE;border-color:#BFDBFE}.mrr{background:#FDF2F8;border-color:#FBCFE8}
.mv{color:#0EA5E9;font-weight:700;flex-shrink:0}

/* === Anomaly (module3) === */
.anomaly{padding:8px 12px;background:#FEF3C7;border-radius:8px;font-size:12px;font-weight:600;color:#78350F;margin-bottom:6px}

/* === Checklist (module4) === */
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F8FAFC;border-radius:8px;margin-bottom:4px;font-size:12px}
.ci.ok{background:#D1FAE5}.cb{width:20px;height:20px;border:2px solid #D1D5DB;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent}
.ci.ok .cb{background:#10B981;border-color:#10B981;color:white}

/* === Debounce (module5) === */
.deb{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;margin-bottom:6px}
.dm{padding:8px;background:#F9FAFB;border-radius:6px}.dn{font-size:16px;font-weight:900;color:#1E3A8A}.dl{font-size:8px;color:#6B7280;margin-top:2px}

/* === Flowchart nodes (module5) === */
.fc{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:6px}
.fn{display:inline-block;padding:5px 12px;border-radius:8px;border:2px solid;font-weight:600;font-size:10px;text-align:center}
.fn.s{border-color:#10B981;background:#D1FAE5}.fn.d{border-color:#F59E0B;background:#FEF3C7}.fn.f{border-color:#8B5CF6;background:#EDE9FE}
.fd{color:#9CA3AF;font-size:12px}.fc2{display:flex;justify-content:center;gap:12px}

/* === Quiz (module6) === */
.qq{padding:10px 14px;border:2px solid #E5E7EB;border-radius:8px;margin-bottom:8px}
.qq.cor{border-color:#10B981;background:#F0FDF4}.qq.wrg{border-color:#EF4444;background:#FEF2F2}
.qq-t{font-size:12px;font-weight:600;margin-bottom:4px}.qos{display:flex;flex-direction:column;gap:4px}
.qo{padding:6px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:12px}
.qo.ca{border-color:#10B981;background:#D1FAE5;font-weight:600}.qo.wa{border-color:#EF4444;background:#FEE2E2;font-weight:600}

/* === Radar SVG === */
.rd-wrap{text-align:center;margin:8px auto;width:240px;height:240px}

/* === Phone (module4 exact) === */
.phone-frame{width:200px;background:#0F172A;border:3px solid #1F2937;border-radius:24px;padding:6px;margin:4px auto;flex-shrink:0;position:relative}
.phone-notch{width:60px;height:16px;background:#1F2937;border-radius:0 0 10px 10px;margin:0 auto 4px}
.phone-screen{min-height:200px;background:#F8FAFC;border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.phone-slot{min-height:42px;border:2px dashed #CBD5E1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94A3B8;padding:6px;background:rgba(255,255,255,0.5)}
.phone-slot:hover{border-color:var(--mid-blue);background:rgba(59,130,246,0.05)}
.phone-slot.filled{border-style:solid;border-color:transparent;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:8px;display:block}
/* Slot content styles */
.slot-total{text-align:center;padding:4px}
.slot-total .big-num{font-size:32px;font-weight:900;color:#1E3A8A;line-height:1.1}
.slot-total .big-label{font-size:10px;color:#6B7280;font-weight:500}
.slot-floor{display:flex;flex-direction:column;gap:3px}
.floor-row{display:flex;align-items:center;gap:6px;font-size:10px}
.floor-name{flex:1;font-weight:500;color:#374151}
.floor-bar-bg{width:40px;height:7px;background:#E5E7EB;border-radius:3px;overflow:hidden}
.floor-bar-fill{height:100%;border-radius:3px}
.floor-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.slot-suggest{text-align:center;padding:4px}
.slot-suggest .suggest-icon{font-size:18px;margin-bottom:2px}
.slot-suggest .suggest-text{font-size:11px;font-weight:600;color:#065F46}
.slot-suggest .suggest-time{font-size:10px;color:#6B7280}
.slot-heatmap-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:2px;width:100%}
.heatmap-mini-cell{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;color:white}
.slot-trend{padding:4px;text-align:center;font-size:10px;color:#6B7280}
.slot-trend .trend-line{width:100%;height:30px;background:linear-gradient(to right,#DBEAFE 0%,#3B82F6 30%,#3B82F6 50%,#F59E0B 70%,#DBEAFE 100%);border-radius:4px}
.slot-notify{display:flex;align-items:center;gap:8px;padding:6px;font-size:11px}
.slot-notify .bell-icon{font-size:16px}
.slot-notify .notify-label{color:#374151;font-weight:500}
.slot-notify .toggle-switch{width:30px;height:16px;background:#10B981;border-radius:8px;position:relative;margin-left:auto}
.slot-notify .toggle-switch::after{content:'';width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:2px;right:2px}
.slot-history{padding:4px 6px;font-size:10px}
.slot-history .hist-row{display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #F1F5F9;color:#374151}
.slot-history .hist-label{color:#9CA3AF}

/* === Footer === */
.ws-ft{margin-top:8px;padding:6px 16px;border-top:1px solid #E5E7EB;font-size:8px;color:#9CA3AF;display:flex;justify-content:space-between}
.print-bar{padding:12px 16px;background:#F0F9FF;border-bottom:2px solid #BFDBFE;display:flex;align-items:center;gap:12px}

/* === Print === */
@media print{
  *,*::before,*::after{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;forced-color-adjust:none!important}
  body{background:white!important;padding:0!important;margin:0!important}
  .ws{box-shadow:none!important;margin:0 auto!important}
  .print-bar{display:none!important}
}
</style>
</head>
<body>

<div class="ws" id="wsRoot">
  <div class="print-bar">
    <button onclick="doPrint()" style="padding:10px 24px;font-size:16px;background:var(--deep-blue);color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;">
      🖨️ 列印工作單（另存為 PDF）
    </button>
    <span style="color:#6B7280;font-size:13px;">點擊列印，在對話框中選擇「另存為 PDF」即可下載</span>
  </div>
  <div class="ws-hd"><div><h1>🔍 解碼圖書館熱力圖</h1><div class="sub">計算思維自學工坊 — 學習工作單</div></div><div class="meta" id="meta"></div></div>
  <div class="ws-body" id="body"></div>
  <div class="ws-ft">解碼圖書館熱力圖 — 計算思維自學工坊<span>系統自動生成</span></div>
</div>

<script>
(function(){
  var D=JSON.parse(localStorage.getItem('ct_worksheet_data')||'{}');
  var name=localStorage.getItem('ct_workshop_name')||'同學';
  // ?test=1 快速預覽
  if(window.location.search.indexOf('test=1')!==-1&&!localStorage.getItem('ct_worksheet_data')){
    localStorage.setItem('ct_workshop_name','王小華');
    localStorage.setItem('ct_workshop_progress','{"module1":1,"module2":1,"module3":1,"module4":1,"module5":1,"module6":1}');
    localStorage.setItem('ct_worksheet_data',JSON.stringify({m1_vote:'7 次以上',m1_thought:'可以做一個系統顯示哪裡有空位、什麼時段人比較少。',m1_sort:['如何統計進館人數？','如何展示空座資訊？','如何預測擁擠時段？'],m2_classify:'10/10',m2_flow:['📡 感測器','📶 網路傳輸','🧮 計數處理','🗄️ 儲存數據','📱 App 展示'],m3_match:[{left:'上午10點人數最高',right:'時間規律'},{left:'週末人數銳減',right:'週期模式'},{left:'考試週爆滿',right:'事件觸發'},{left:'週五人數異常升高',right:'異常數據'}],m3_anomaly:'雨天效應導致的異常突增',m3_predict:'110 人（實際 120 人，偏差 8.3%）',m4_checklist:[{text:'顏色濃度表示擁擠度',checked:1},{text:'字型適合手機閱讀',checked:1},{text:'支援點擊互動',checked:0},{text:'即時更新人數',checked:1},{text:'建議替代方案',checked:1},{text:'可切換樓層視角',checked:0}],m4_design:['total','floor','suggest','heatmap','notify'],m4_reflect:'我保留了擁擠度的顏色指示，因為同學只需要知道「擠不擠」。',m5_debounce:'300 ms',m5_debounce_result:{total:24,fp:1,missed:0,acc:95.8},m5_flowchart:'正確 5/5',m6_quiz:'3/4',m6_quiz_detail:[{chosen:'B',correct:'B',right:1},{chosen:'D',correct:'D',right:1},{chosen:'C',correct:'C',right:1},{chosen:'A',correct:'D',right:0}],m6_radar:{'分解':'7','模式識別':'8','抽象':'9','算法設計':'6'},m6_reflect1:'以前以為只需要裝感測器，現在知道還需要算法和界面。',m6_reflect2:'在去抖邏輯中卡住了，理解冷卻期後想通。',m6_reflect3:'抽象最厲害——紅綠燈比顯示人數更有用。'}));
    D=JSON.parse(localStorage.getItem('ct_worksheet_data'));
    name=localStorage.getItem('ct_workshop_name');
  }
  var prog=JSON.parse(localStorage.getItem('ct_workshop_progress')||'{}');
  var now=new Date(),ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate();
  document.getElementById('meta').innerHTML='<strong>'+name+'</strong>'+ds+'<br>完成 '+Object.keys(prog).length+' / 6 模組';

  function g(k){return D[k]||''}
  function gg(k){var x=g(k);return x||'<span class="em">（未填寫）</span>'}
  function mh(t,c,cl){return'<div class="wm"><div class="wh" style="background:'+cl+'"><span class="tag">'+t+'</span><span class="ct-tag">'+c+'</span></div><div class="wb">'}

  // uiComponents — same as module4
  var uiComponents=[{id:'total',name:'📊 總人數卡片',render:function(){return'<div style="text-align:center;padding:4px"><div style="font-size:32px;font-weight:900;color:#1E3A8A;line-height:1.1">147</div><div style="font-size:10px;color:#6B7280;font-weight:500">目前在館人數</div></div>'}},{id:'floor',name:'🚦 樓層擁擠度',render:function(){return'<div style="display:flex;flex-direction:column;gap:3px"><div style="display:flex;align-items:center;gap:6px;font-size:10px"><div style="width:9px;height:9px;border-radius:50%;background:#EF4444;flex-shrink:0"></div><span style="flex:1;font-weight:500;color:#374151">3F 自修</span><div style="width:40px;height:7px;background:#E5E7EB;border-radius:3px;overflow:hidden"><div style="width:85%;height:100%;background:#EF4444;border-radius:3px"></div></div></div><div style="display:flex;align-items:center;gap:6px;font-size:10px"><div style="width:9px;height:9px;border-radius:50%;background:#F59E0B;flex-shrink:0"></div><span style="flex:1;font-weight:500;color:#374151">2F 閱覽</span><div style="width:40px;height:7px;background:#E5E7EB;border-radius:3px;overflow:hidden"><div style="width:55%;height:100%;background:#F59E0B;border-radius:3px"></div></div></div><div style="display:flex;align-items:center;gap:6px;font-size:10px"><div style="width:9px;height:9px;border-radius:50%;background:#10B981;flex-shrink:0"></div><span style="flex:1;font-weight:500;color:#374151">1F 兒童</span><div style="width:40px;height:7px;background:#E5E7EB;border-radius:3px;overflow:hidden"><div style="width:20%;height:100%;background:#10B981;border-radius:3px"></div></div></div></div>'}},{id:'suggest',name:'💡 建議時段',render:function(){return'<div style="text-align:center;padding:4px"><div style="font-size:18px;margin-bottom:2px">🕐</div><div style="font-size:11px;font-weight:600;color:#065F46">建議 14:00 後前往</div><div style="font-size:10px;color:#6B7280">預計 2F 空位較多</div></div>'}},{id:'heatmap',name:'🗺️ 熱力圖',render:function(){var cs=[{c:'#10B981',t:'閱覽'},{c:'#F59E0B',t:'自修'},{c:'#EF4444',t:'電腦'},{c:'#10B981',t:'期刊'},{c:'#10B981',t:'入口'},{c:'#10B981',t:'新書'},{c:'#F59E0B',t:'討論'},{c:'#10B981',t:'休息'},{c:'#10B981',t:'兒童'},{c:'#10B981',t:'視聽'},{c:'#10B981',t:'報刊'},{c:'#10B981',t:'服務'}];var h='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:2px">';cs.forEach(function(x){h+='<div style="height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;color:white;background:'+x.c+'">'+x.t+'</div>'});return h+'</div>'}},{id:'trend',name:'📈 趨勢折線圖',render:function(){return'<div style="padding:4px;text-align:center"><div style="width:100%;height:30px;background:linear-gradient(to right,#DBEAFE,#3B82F6,#3B82F6,#F59E0B,#DBEAFE);border-radius:4px"></div><div style="font-size:10px;color:#6B7280;margin-top:2px">今日人數變化 8→18時</div></div>'}},{id:'notify',name:'🔔 通知設定',render:function(){return'<div style="display:flex;align-items:center;gap:8px;padding:6px;font-size:11px"><span style="font-size:16px">🔔</span><span style="color:#374151;font-weight:500">擁擠提醒</span><div style="width:30px;height:16px;background:#10B981;border-radius:8px;margin-left:auto;position:relative"><div style="width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:2px;right:2px"></div></div></div>'}},{id:'history',name:'📋 歷史記錄',render:function(){return'<div style="padding:4px 6px;font-size:10px"><div style="display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #F1F5F9;color:#374151"><span style="color:#9CA3AF">週一</span><span>132人</span></div><div style="display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #F1F5F9;color:#374151"><span style="color:#9CA3AF">週二</span><span>98人</span></div><div style="display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px solid #F1F5F9;color:#374151"><span style="color:#9CA3AF">週三</span><span>145人</span></div></div>'}}];

  var h='';

  // Module 1
  h+=mh('模組 1 — 痛點挖掘','問題定義','#EF4444');
  h+='<div class="lbl">📊 投票：你去圖書館時遇到過幾次沒座位？</div><div class="vote-row">';
  ['0 次','1-3 次','4-6 次','7 次以上'].forEach(function(o){h+='<span class="vt'+(o===g('m1_vote')?' sel':'')+'">'+o+'</span>'});
  h+='</div><div class="lbl">💭 思考泡泡</div><div class="txt'+(g('m1_thought')?'':' em')+'">'+gg('m1_thought')+'</div>';
  var sa=g('m1_sort');h+='<div class="lbl">📋 問題排序</div>';
  if(sa&&sa.length){h+='<div class="sort">';sa.forEach(function(s,i){h+='<div class="si"><div class="sn">'+(i+1)+'</div>'+s+'</div>'});h+='</div>'}
  else{h+='<div class="txt em">（未完成排序）</div>'}
  h+='</div></div>';

  // Module 2
  h+=mh('模組 2 — 解構問題','分解','#F59E0B');
  var fa=g('m2_flow');h+='<div class="lbl">🔄 數據流排序</div>';
  if(fa&&fa.length){h+='<div class="flow">';fa.filter(Boolean).forEach(function(s,i){if(i>0)h+='<span class="fw">→</span>';h+='<span class="fs">'+s+'</span>'});h+='</div>'}
  else{h+='<div class="txt em">（未完成）</div>'}
  h+='<div class="lbl">📦 卡片分類</div><div class="txt">'+gg('m2_classify')+'</div>';
  h+='</div></div>';

  // Module 3
  h+=mh('模組 3 — 模式偵探','模式識別','#0EA5E9');
  var ma=g('m3_match');h+='<div class="lbl">🔗 模式配對</div>';
  if(ma&&ma.length){ma.forEach(function(p){h+='<div class="mr"><div class="ml">'+p.left+'</div><span class="mv">→</span><div class="mrr">'+p.right+'</div></div>'})}
  else{h+='<div class="txt em">（未完成配對）</div>'}
  h+='<div class="lbl">⚠️ 異常數據判斷</div><div class="anomaly">'+gg('m3_anomaly')+'</div>';
  h+='<div class="lbl">🔮 雨天預測</div><div class="txt">'+gg('m3_predict')+'</div>';
  h+='</div></div>';

  // Module 4
  h+=mh('模組 4 — 視覺化設計師','抽象','#EC4899');
  h+='<div class="lbl">✅ 設計檢查清單</div>';
  var cl=g('m4_checklist');if(cl&&cl.length){cl.forEach(function(x){h+='<div class="ci'+(x.checked?' ok':'')+'"><div class="cb">✓</div><span>'+x.text+'</span></div>'})}
  else{h+='<div class="txt em">（未完成檢查清單）</div>'}
  var dsn=g('m4_design');h+='<div class="lbl">📱 手機原型設計</div>';
  if(dsn&&dsn.length){
    h+='<div class="phone-frame"><div class="phone-notch"></div><div class="phone-screen">';
    dsn.forEach(function(id){var comp=uiComponents.find(function(c){return c.id===id});if(comp){h+='<div class="phone-slot filled">'+comp.render()+'</div>'}else{h+='<div class="phone-slot filled">'+id+'</div>'}});
    h+='</div></div>';
  }else{h+='<div class="txt em">（未設計）</div>'}
  h+='<div class="lbl">💬 抽象反思</div><div class="txt'+(g('m4_reflect')?'':' em')+'">'+gg('m4_reflect')+'</div>';
  h+='</div></div>';

  // Module 5
  h+=mh('模組 5 — 算法工程師','算法設計','#8B5CF6');
  var dr=g('m5_debounce_result');h+='<div class="lbl">⏱ 去抖測試：<b>'+gg('m5_debounce')+'</b></div>';
  if(dr&&dr.total){var ac=dr.acc>=90?'#10B981':dr.acc>=75?'#F59E0B':'#EF4444';h+='<div class="deb"><div class="dm"><div class="dn">'+dr.total+'</div><div class="dl">總人數</div></div><div class="dm"><div class="dn" style="color:#F59E0B">'+dr.fp+'</div><div class="dl">誤報</div></div><div class="dm"><div class="dn" style="color:#10B981">'+dr.missed+'</div><div class="dl">漏計</div></div><div class="dm"><div class="dn" style="color:'+ac+'">'+dr.acc+'%</div><div class="dl">準確率</div></div></div>'}
  else{h+='<div class="txt em">（未完成去抖測試）</div>'}
  h+='<div class="lbl">🔀 流程圖填空</div><div class="fc">';
  h+='<span class="fn s">IR 感測器觸發</span><span class="fd">⬇</span>';
  h+='<span class="fn d">方向判定</span><span class="fd">⬇</span>';
  h+='<div class="fc2"><span class="fn f">enter_count += 1</span><span class="fn f">exit_count += 1</span></div><span class="fd">⬇</span>';
  h+='<span class="fn f">更新 current_count</span><span class="fd">⬇</span>';
  h+='<span class="fn f">邊界保護</span><span class="fd">⬇</span>';
  h+='<span class="fn f">去抖過濾</span></div>';
  h+='<div style="text-align:center;font-weight:700;margin-top:4px">'+gg('m5_flowchart')+'</div>';
  h+='</div></div>';

  // Module 6
  h+=mh('模組 6 — 系統整合與反思','整合','#10B981');
  h+='<div class="lbl">🧠 概念測驗</div>';
  var qq=['1. 拆成三個模組屬於？','2. 先遮A再遮B=進入屬於？','3. 紅綠燈代替人數屬於？','4. 每天10-12點是高峰屬於？'];
  var qo=[['A.模式識別','B.分解','C.抽象','D.算法設計'],['A.分解','B.模式識別','C.抽象','D.算法設計'],['A.算法設計','B.分解','C.抽象','D.模式識別'],['A.抽象','B.算法設計','C.分解','D.模式識別']];
  var qd=g('m6_quiz_detail');
  for(var i=0;i<4;i++){var clr='';if(qd&&qd[i])clr=qd[i].right?' cor':' wrg';
    h+='<div class="qq'+clr+'"><div class="qq-t">'+qq[i]+'</div><div class="qos">';
    qo[i].forEach(function(o,j){var c='';if(qd&&qd[i]){if(qd[i].chosen===String.fromCharCode(65+j))c=qd[i].right?' ca':' wa';else if(qd[i].correct===String.fromCharCode(65+j))c=' ca'}h+='<span class="qo'+c+'">'+o+'</span>'});
    h+='</div></div>';}
  h+='<div style="text-align:center;font-size:15px;font-weight:900;color:#F59E0B;margin:10px 0">得分：'+gg('m6_quiz')+'</div>';
  h+='<div class="lbl">📊 能力自評</div>';
  var rd=g('m6_radar');
  if(rd&&rd['分解']){h+='<div class="rd-wrap" id="radarWrap"></div>'}
  else{h+='<div class="txt em">（未完成）</div>'}
  h+='<div class="lbl">💬 反思</div><div class="txt'+(g('m6_reflect1')?'':' em')+'">'+gg('m6_reflect1')+'</div><div class="txt'+(g('m6_reflect2')?'':' em')+'">'+gg('m6_reflect2')+'</div><div class="txt'+(g('m6_reflect3')?'':' em')+'">'+gg('m6_reflect3')+'</div>';
  h+='</div></div>';

  document.getElementById('body').innerHTML=h;

  // Draw radar SVG
  var rd=g('m6_radar');
  if(rd&&rd['分解']){
    var rl=['分解','模式識別','抽象','算法設計'];
    var vals=[parseInt(rd[rl[0]])||5,parseInt(rd[rl[1]])||5,parseInt(rd[rl[2]])||5,parseInt(rd[rl[3]])||5];
    var W=240,H=240,cx=120,cy=120,R=80;
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    for(var lv=1;lv<=5;lv++){var lr=(lv/5)*R;var pts=[];for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;pts.push((cx+lr*Math.cos(a)).toFixed(1)+','+(cy+lr*Math.sin(a)).toFixed(1))}svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#E5E7EB" stroke-width="1"/>'}
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(a)).toFixed(1)+'" y2="'+(cy+R*Math.sin(a)).toFixed(1)+'" stroke="#D1D5DB" stroke-width="1"/>'}
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var lx=cx+(R+22)*Math.cos(a),ly=cy+(R+22)*Math.sin(a);svg+='<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" text-anchor="middle" font-size="11" font-family="Noto Sans TC" fill="#6B7280">'+rl[i]+'</text>'}
    var dps=[];for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var v=vals[i]/10;dps.push((cx+R*v*Math.cos(a)).toFixed(1)+','+(cy+R*v*Math.sin(a)).toFixed(1))}
    svg+='<polygon points="'+dps.join(' ')+'" fill="rgba(59,130,246,0.25)" stroke="#3B82F6" stroke-width="2"/>';
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var v=vals[i]/10;svg+='<circle cx="'+(cx+R*v*Math.cos(a)).toFixed(1)+'" cy="'+(cy+R*v*Math.sin(a)).toFixed(1)+'" r="3" fill="#3B82F6"/>'}
    svg+='</svg>';
    document.getElementById('radarWrap').innerHTML=svg;
  }

  // Print
  window.doPrint=function(){
    var ws=document.getElementById('wsRoot');
    var hmm=Math.ceil(ws.scrollHeight*0.2646)+10;
    var style=document.createElement('style');
    style.id='ps';style.textContent='@page{size:210mm '+hmm+'mm;margin:0}';
    document.head.appendChild(style);
    window.print();
    setTimeout(function(){var el=document.getElementById('ps');if(el)el.remove()},1000);
  };
  if(window.location.search.indexOf('print=1')!==-1){setTimeout(doPrint,600)}
})();
</script>
</body>
</html>
