<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* === Base variables === */
:root{--deep-blue:#1E3A8A;--light-blue:#DBEAFE;--mid-blue:#3B82F6;--success-green:#10B981;--warning-orange:#F59E0B;--danger-red:#EF4444;--bg:#F0F4F8;--card-bg:#FFFFFF;--text:#1F2937;--text-light:#6B7280;--shadow:0 4px 24px rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);--step-red:#EF4444;--step-amber:#F59E0B;--step-cyan:#0EA5E9;--step-pink:#EC4899;--step-purple:#8B5CF6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#E5E7EB;display:flex;justify-content:center;padding:16px}
.ws{width:210mm;background:white;box-shadow:0 2px 16px rgba(0,0,0,0.15)}

/* === Header === */
.ws-hd{background:linear-gradient(135deg,#1E3A8A,#3B82F6);padding:16px 20px;color:white;display:flex;justify-content:space-between;align-items:center}
.ws-hd h1{font-size:20px;font-weight:900}.ws-hd .sub{font-size:10px;opacity:0.8}
.meta{font-size:10px;text-align:right;background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:6px;line-height:1.6}
.ws-body{padding:12px 16px}

/* === Module blocks === */
.wm{margin-bottom:10px;page-break-inside:avoid;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden}
.wh{display:flex;align-items:center;gap:6px;padding:8px 12px;color:white;font-weight:700;font-size:12px}
.wh .tag{font-size:9px;background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:8px}
.wh .ct-tag{margin-left:auto;font-size:9px;background:rgba(0,0,0,0.12);padding:2px 6px;border-radius:8px}
.wb{padding:10px 12px}

/* === Labels & Text === */
.lbl{font-size:11px;color:#1E3A8A;font-weight:600;margin:6px 0 3px}.lbl:first-child{margin-top:2px}
.txt{font-size:12px;color:#374151;line-height:1.6;padding:8px 10px;background:#F9FAFB;border-radius:6px;margin-bottom:6px;white-space:pre-wrap}
.txt.em{color:#D1D5DB;font-style:italic}

/* === Vote buttons (module1) === */
.vote-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.vt{padding:8px 20px;border:2px solid #E5E7EB;border-radius:24px;font-size:13px;color:#6B7280}
.vt.sel{border-color:#EF4444;background:#FEF2F2;color:#B91C1C;font-weight:700}

/* === Sort (module1) === */
.sort{border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;margin-bottom:8px}
.si{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #F3F4F6;font-size:13px;background:white}.si:last-child{border-bottom:none}
.sn{width:24px;height:24px;border-radius:50%;background:#1E3A8A;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* === Flow slots (module2) === */
.flow{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.fs{padding:8px 12px;border:2px solid #3B82F6;border-radius:10px;font-size:11px;background:#DBEAFE;color:#1E3A8A;font-weight:600}
.fw{color:#9CA3AF;font-size:12px;flex-shrink:0}

/* === Match pairs (module3) === */
.mr{display:flex;align-items:center;gap:8px;margin-bottom:6px}.ml,.mrr{padding:8px 12px;border:2px solid;border-radius:8px;font-size:12px;flex:1}
.ml{text-align:right;background:#DBEAFE;border-color:#BFDBFE}.mrr{background:#FDF2F8;border-color:#FBCFE8}
.mv{color:#0EA5E9;font-weight:700;flex-shrink:0}

/* === Anomaly (module3) === */
.anomaly{padding:8px 12px;background:#FEF3C7;border-radius:8px;font-size:12px;font-weight:600;color:#78350F;margin-bottom:6px}

/* === Checklist (module4) === */
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F8FAFC;border-radius:8px;margin-bottom:4px;font-size:12px}
.ci.ok{background:#D1FAE5}.cb{width:20px;height:20px;border:2px solid #D1D5DB;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent}
.ci.ok .cb{background:#10B981;border-color:#10B981;color:white}

/* === Debounce (module5) === */
.deb{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;margin-bottom:6px}
.dm{padding:8px;background:#F9FAFB;border-radius:6px}.dn{font-size:16px;font-weight:900;color:#1E3A8A}.dl{font-size:8px;color:#6B7280;margin-top:2px}

/* === Flowchart nodes (module5) === */
.fc{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:6px}
.fn{display:inline-block;padding:5px 12px;border-radius:8px;border:2px solid;font-weight:600;font-size:10px;text-align:center}
.fn.s{border-color:#10B981;background:#D1FAE5}.fn.d{border-color:#F59E0B;background:#FEF3C7}.fn.f{border-color:#8B5CF6;background:#EDE9FE}
.fd{color:#9CA3AF;font-size:12px}.fc2{display:flex;justify-content:center;gap:12px}

/* === Quiz (module6) === */
.qq{padding:10px 14px;border:2px solid #E5E7EB;border-radius:8px;margin-bottom:8px}
.qq.cor{border-color:#10B981;background:#F0FDF4}.qq.wrg{border-color:#EF4444;background:#FEF2F2}
.qq-t{font-size:12px;font-weight:600;margin-bottom:4px}.qos{display:flex;flex-direction:column;gap:4px}
.qo{padding:6px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:12px}
.qo.ca{border-color:#10B981;background:#D1FAE5;font-weight:600}.qo.wa{border-color:#EF4444;background:#FEE2E2;font-weight:600}

/* === Radar SVG === */
.rd-wrap{text-align:center;margin:8px auto;width:260px;height:260px}

/* === Phone (module4 exact CSS) === */
.phone-frame{width:280px;min-height:500px;background:#0F172A;border:3px solid #1F2937;border-radius:32px;padding:8px;flex-shrink:0;position:relative;margin:4px auto}
.phone-notch{width:90px;height:22px;background:#1F2937;border-radius:0 0 14px 14px;margin:0 auto 6px;position:relative}
.phone-notch::after{content:'';width:8px;height:8px;background:#374151;border-radius:50%;position:absolute;right:20px;top:7px}
.phone-statusbar{display:flex;justify-content:space-between;align-items:center;padding:2px 12px 4px;font-size:10px;color:rgba(255,255,255,0.5)}
.phone-screen{min-height:430px;background:#F8FAFC;border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.phone-slot{min-height:48px;border:2px dashed #CBD5E1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#94A3B8;padding:6px;background:rgba(255,255,255,0.5)}
.phone-slot:hover{border-color:var(--mid-blue);background:rgba(59,130,246,0.05)}
.phone-slot.filled{border-style:solid;border-color:transparent;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:8px;display:block}
/* Slot content */
.slot-total{text-align:center;padding:6px}
.slot-total .big-num{font-size:36px;font-weight:900;color:#1E3A8A;line-height:1.1}
.slot-total .big-label{font-size:11px;color:#6B7280;font-weight:500}
.slot-floor{display:flex;flex-direction:column;gap:4px}
.floor-row{display:flex;align-items:center;gap:6px;font-size:11px}
.floor-name{flex:1;font-weight:500;color:#374151}
.floor-bar-bg{width:50px;height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.floor-bar-fill{height:100%;border-radius:4px}
.floor-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.slot-suggest{text-align:center;padding:6px}
.slot-suggest .suggest-icon{font-size:20px;margin-bottom:2px}
.slot-suggest .suggest-text{font-size:12px;font-weight:600;color:#065F46}
.slot-suggest .suggest-time{font-size:11px;color:#6B7280}
.slot-heatmap-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:4px;width:100%}
.heatmap-mini-cell{height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:white}
.slot-trend{padding:4px;text-align:center}
.slot-trend svg{width:100%;height:40px}
.slot-trend .trend-label{font-size:10px;color:#6B7280;margin-top:2px}
.slot-notify{display:flex;align-items:center;gap:8px;padding:6px;font-size:12px}
.slot-notify .bell-icon{font-size:18px}
.slot-notify .notify-label{color:#374151;font-weight:500}
.slot-notify .toggle-switch{width:32px;height:18px;background:#10B981;border-radius:9px;position:relative;margin-left:auto}
.slot-notify .toggle-switch::after{content:'';width:14px;height:14px;background:white;border-radius:50%;position:absolute;top:2px;right:2px}
.slot-history{padding:6px;font-size:11px}
.slot-history .hist-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #F1F5F9;color:#374151}
.slot-history .hist-label{color:#9CA3AF}

/* === Footer === */
.ws-ft{margin-top:8px;padding:6px 16px;border-top:1px solid #E5E7EB;font-size:8px;color:#9CA3AF;display:flex;justify-content:space-between}
.print-bar{padding:12px 16px;background:#F0F9FF;border-bottom:2px solid #BFDBFE;display:flex;align-items:center;gap:12px}

/* === Print === */
@media print{
  *,*::before,*::after{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;forced-color-adjust:none!important}
  body{background:white!important;padding:0!important;margin:0!important}
  .ws{box-shadow:none!important;margin:0 auto!important}
  .print-bar{display:none!important}
}
</style>
<script src="js/i18n.js"></script>
</head>
<body>

<div class="ws" id="wsRoot">
  <div class="print-bar">
    <button onclick="doPrint()" style="padding:10px 24px;font-size:16px;background:var(--deep-blue);color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;">
      🖨️ Print Worksheet (Save as PDF)
    </button>
    <span style="color:#6B7280;font-size:13px;">Click print, choose "Save as PDF" to download</span>
  </div>
  <div class="ws-hd"><div><h1>🔍 Decoding the Library Heatmap</h1><div class="sub">CT Self-Study Workshop — Learning Worksheet</div></div><div class="meta" id="meta"></div></div>
  <div class="ws-body" id="body"></div>
  <div class="ws-ft">Decoding the Library Heatmap — CT Self-Study Workshop<span>Auto-generated</span></div>
</div>

<script>
(function(){
  var D=JSON.parse(localStorage.getItem('ct_worksheet_data')||'{}');
  var name=localStorage.getItem('ct_workshop_name')||'Student';
  var prog=JSON.parse(localStorage.getItem('ct_workshop_progress')||'{}');
  var now=new Date(),ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate();
  document.getElementById('meta').innerHTML='<strong>'+name+'</strong>'+ds+'<br>Completed '+Object.keys(prog).length+' / 6 modules';

  function g(k){return D[k]||''}
  function gg(k){var x=g(k);return x||'<span class="em">(Not filled)</span>'}
  function mh(t,c,cl){return'<div class="wm"><div class="wh" style="background:'+cl+'"><span class="tag">'+t+'</span><span class="ct-tag">'+c+'</span></div><div class="wb">'}

  // uiComponents — same as module4
  var uiComponents=[{id:'total',name:'📊 Total Count',render:function(){return'<div class="slot-total"><div class="big-num">147</div><div class="big-label">Current Occupancy</div></div>'}},{id:'floor',name:'🚦 Floor Occupancy',render:function(){return'<div class="slot-floor"><div class="floor-row"><div class="floor-dot" style="background:#EF4444"></div><span class="floor-name">3F Study</span><div class="floor-bar-bg"><div class="floor-bar-fill" style="width:85%;background:#EF4444"></div></div></div><div class="floor-row"><div class="floor-dot" style="background:#F59E0B"></div><span class="floor-name">2F Reading</span><div class="floor-bar-bg"><div class="floor-bar-fill" style="width:55%;background:#F59E0B"></div></div></div><div class="floor-row"><div class="floor-dot" style="background:#10B981"></div><span class="floor-name">1F Children</span><div class="floor-bar-bg"><div class="floor-bar-fill" style="width:20%;background:#10B981"></div></div></div></div>'}},{id:'suggest',name:'💡 Suggested Time',render:function(){return'<div class="slot-suggest"><div class="suggest-icon">🕐</div><div class="suggest-text">Suggested: after 14:00</div><div class="suggest-time">2F likely has most seats</div></div>'}},{id:'heatmap',name:'🗺️ Heatmap',render:function(){var cs=[{c:'#10B981',t:'Reading'},{c:'#F59E0B',t:'Study'},{c:'#EF4444',t:'Computer'},{c:'#10B981',t:'Periodicals'},{c:'#10B981',t:'Entrance'},{c:'#10B981',t:'New Books'},{c:'#F59E0B',t:'Discussion'},{c:'#10B981',t:'Lounge'},{c:'#10B981',t:'Children'},{c:'#10B981',t:'A/V Room'},{c:'#10B981',t:'Newspapers'},{c:'#10B981',t:'Info Desk'}];var h='<div class="slot-heatmap-mini">';cs.forEach(function(x){h+='<div class="heatmap-mini-cell" style="background:'+x.c+'">'+x.t+'</div>'});return h+'</div>'}},{id:'trend',name:'📈 Trend Chart',render:function(){return'<div class="slot-trend"><svg viewBox="0 0 240 40" width="100%" height="40"><polyline points="0,30 30,20 60,10 90,5 120,15 150,25 180,20 210,15 240,8" fill="none" stroke="#3B82F6" stroke-width="2"/><rect x="0" y="0" width="240" height="40" fill="rgba(59,130,246,0.08)"/><polyline points="0,30 30,20 60,10 90,5 120,15 150,25 180,20 210,15 240,8 240,40 0,40" fill="rgba(59,130,246,0.15)"/></svg><div class="trend-label">Today 8→18:00</div></div>'}},{id:'notify',name:'🔔 Notifications',render:function(){return'<div class="slot-notify"><span class="bell-icon">🔔</span><span class="notify-label">Crowding Alert</span><div class="toggle-switch"></div></div>'}},{id:'history',name:'📋 History',render:function(){return'<div class="slot-history"><div class="hist-row"><span class="hist-label">Mon</span><span>132 people</span></div><div class="hist-row"><span class="hist-label">Tue</span><span>98 people</span></div><div class="hist-row"><span class="hist-label">Wed</span><span>145 people</span></div></div>'}}];

  var h='';

  // Module 1
  h+=mh('Module 1 — Pain Point Discovery','Problem Def.','#EF4444');
  h+='<div class="lbl">📊 Vote:How often do you find no seats?</div><div class="vote-row">';
  ['0  times','1-3  times','4-6  times','7+ times'].forEach(function(o){h+='<span class="vt'+(o===g('m1_vote')?' sel':'')+'">'+o+'</span>'});
  h+='</div><div class="lbl">💭 Thought Bubble</div><div class="txt'+(g('m1_thought')?'':' em')+'">'+gg('m1_thought')+'</div>';
  var sa=g('m1_sort');h+='<div class="lbl">📋 Problem Ranking</div>';
  if(sa&&sa.length){h+='<div class="sort">';sa.forEach(function(s,i){h+='<div class="si"><div class="sn">'+(i+1)+'</div>'+s+'</div>'});h+='</div>'}
  else{h+='<div class="txt em">(Not ranked)</div>'}
  h+='</div></div>';

  // Module 2
  h+=mh('Module 2 — Deconstruction','Decomposition','#F59E0B');
  var fa=g('m2_flow');h+='<div class="lbl">🔄 Data Flow Sort</div>';
  if(fa&&fa.length){h+='<div class="flow">';fa.filter(Boolean).forEach(function(s,i){if(i>0)h+='<span class="fw">→</span>';h+='<span class="fs">'+s+'</span>'});h+='</div>'}
  else{h+='<div class="txt em">(Not completed)</div>'}
  h+='<div class="lbl">📦 Card Sort</div>';
  var cd = g('m2_classify_detail');
  var classifyCards = [
    { id: 'ir', name: '📡 IR Sensor', category: 'collect', catName: 'Collection' },
    { id: 'cam', name: '📷 Camera', category: 'collect', catName: 'Collection' },
    { id: 'wifi', name: '📶 WiFi Module', category: 'transmit', catName: 'Transmission' },
    { id: 'ble', name: '🔵 Bluetooth', category: 'transmit', catName: 'Transmission' },
    { id: 'algo', name: '🧮 Counting Algorithm', category: 'process', catName: 'Processing' },
    { id: 'cloud', name: '☁️ Cloud Server', category: 'process', catName: 'Processing' },
    { id: 'db', name: '🗄️ Database', category: 'process', catName: 'Processing' },
    { id: 'app', name: '📱 Mobile App', category: 'display', catName: 'Display' },
    { id: 'map', name: '🗺️ Floor Map', category: 'display', catName: 'Display' },
    { id: 'hist', name: '📊 Historical Data', category: 'display', catName: 'Display' },
  ];
  if (cd) {
    try { cd = JSON.parse(cd); } catch(e) { cd = null; }
    if (cd) { h += '<div class="sort">';
      classifyCards.forEach(function(card) {
        var chosen = cd[card.id] || '(unclassified)';
        var correct = (chosen === card.category);
        h += '<div class="si"><div class="sn" style="background:'+(correct?'#10B981':'#EF4444')+'">'+(correct?'✓':'✗')+'</div>'+card.name+' → '+card.catName+'</div>';
      });
      h += '</div>'; }
    else { h += '<div class="txt">'+gg('m2_classify')+'</div>'; }
  }
  // Module 5 simulator
  h+='</div></div>';

  // Module 3
  h+=mh('Module 3 — Pattern Detective','Pattern Recognition','#0EA5E9');
  var ma=g('m3_match');h+='<div class="lbl">🔗 Pattern Match</div>';
  if(ma&&ma.length){ma.forEach(function(p){h+='<div class="mr"><div class="ml">'+p.left+'</div><span class="mv">→</span><div class="mrr">'+p.right+'</div></div>'})}
  else{h+='<div class="txt em">(Not matched)</div>'}
  h+='<div class="lbl">⚠️ Anomaly Detection</div><div class="anomaly">'+gg('m3_anomaly')+'</div>';
  h+='<div class="lbl">🔮 Rain Prediction</div><div class="txt">'+gg('m3_predict')+'</div>';
  h+='</div></div>';

  // Module 4
  h+=mh('Module 4 — Visual Designer','Abstraction','#EC4899');
  h+='<div class="lbl">✅ Design Checklist</div>';
  var cl=g('m4_checklist');if(cl&&cl.length){cl.forEach(function(x){h+='<div class="ci'+(x.checked?' ok':'')+'"><div class="cb">✓</div><span>'+x.text+'</span></div>'})}
  else{h+='<div class="txt em">(Not checked)</div>'}
  var dsn=g('m4_design');h+='<div class="lbl">📱 Phone Prototype</div>';
  if(dsn&&dsn.length){
    h+='<div class="phone-frame"><div class="phone-notch"></div><div class="phone-statusbar"><span>9:41</span><span>📶 🔋</span></div><div class="phone-screen">';
    dsn.forEach(function(id){var comp=uiComponents.find(function(c){return c.id===id});if(comp){h+='<div class="phone-slot filled">'+comp.render()+'</div>'}else{h+='<div class="phone-slot filled">'+id+'</div>'}});
    h+='</div></div>';
  }else{h+='<div class="txt em">(Not designed)</div>'}
  h+='<div class="lbl">💬 Abstraction Reflection</div><div class="txt'+(g('m4_reflect')?'':' em')+'">'+gg('m4_reflect')+'</div>';
  h+='</div></div>';

  // Module 5
  h+=mh('Module 5 — Algorithm Engineer','Algorithm Design','#8B5CF6');
  h+='<div class="lbl">🎮 Direction Simulator</div>';
  var sim = g('m5_sim');
  if (sim) {
    try { sim = JSON.parse(sim); } catch(e) { sim = null; }
    if (sim) h += '<div class="deb"><div class="dm"><div class="dn">'+sim.enter+'</div><div class="dl">Entries</div></div><div class="dm"><div class="dn">'+sim.exit+'</div><div class="dl">Exits</div></div><div class="dm"><div class="dn">'+(sim.enter-sim.exit)+'</div><div class="dl">Current</div></div></div>';
    else h += '<div class="txt em">(Not completed)</div>';
  } else h += '<div class="txt em">(Not completed)</div>';
  var dr=g('m5_debounce_result');h+='<div class="lbl">⏱ Debounce Test: <b>'+gg('m5_debounce')+'</b></div>';
  if(dr&&dr.total){var ac=dr.acc>=90?'#10B981':dr.acc>=75?'#F59E0B':'#EF4444';h+='<div class="deb"><div class="dm"><div class="dn">'+dr.total+'</div><div class="dl">Total</div></div><div class="dm"><div class="dn" style="color:#F59E0B">'+dr.fp+'</div><div class="dl">FP</div></div><div class="dm"><div class="dn" style="color:#10B981">'+dr.missed+'</div><div class="dl">Missed</div></div><div class="dm"><div class="dn" style="color:'+ac+'">'+dr.acc+'%</div><div class="dl">Accuracy</div></div></div>'}
  else{h+='<div class="txt em">(Debounce test not done)</div>'}
  h+='<div class="lbl">🔀 Flowchart Fill-in</div><div class="fc">';
  h+='<span class="fn s">IR Sensor Trigger</span><span class="fd">⬇</span>';
  h+='<span class="fn d">Direction Check</span><span class="fd">⬇</span>';
  h+='<div class="fc2"><span class="fn f">enter_count += 1</span><span class="fn f">exit_count += 1</span></div><span class="fd">⬇</span>';
  h+='<span class="fn f">Update current_count</span><span class="fd">⬇</span>';
  h+='<span class="fn f">Boundary Guard</span><span class="fd">⬇</span>';
  h+='<span class="fn f">Debounce Filter</span></div>';
  h+='<div style="text-align:center;font-weight:700;margin-top:4px">'+gg('m5_flowchart')+'</div>';
  h+='</div></div>';

  // Module 6
  h+=mh('Module 6 — Integration & Reflection','Integration','#10B981');
  h+='<div class="lbl">🧠 Concept Quiz</div>';
  var qq=['1. Splitting into 3 modules is which CT?','2. A-then-B = Enter is which CT?','3. Traffic lights instead of count is which CT?','4. Daily 10-12 peak is which CT?'];
  var qo=[['A.Pattern Recognition','B.Decomposition','C.Abstraction','D.Algorithm Design'],['A.Decomposition','B.Pattern Recognition','C.Abstraction','D.Algorithm Design'],['A.Algorithm Design','B.Decomposition','C.Abstraction','D.Pattern Recognition'],['A.Abstraction','B.Algorithm Design','C.Decomposition','D.Pattern Recognition']];
  var qd=g('m6_quiz_detail');
  for(var i=0;i<4;i++){var clr='';if(qd&&qd[i])clr=qd[i].right?' cor':' wrg';
    h+='<div class="qq'+clr+'"><div class="qq-t">'+qq[i]+'</div><div class="qos">';
    qo[i].forEach(function(o,j){var c='';if(qd&&qd[i]){if(qd[i].chosen===String.fromCharCode(65+j))c=qd[i].right?' ca':' wa';else if(qd[i].correct===String.fromCharCode(65+j))c=' ca'}h+='<span class="qo'+c+'">'+o+'</span>'});
    h+='</div></div>';}
  h+='<div style="text-align:center;font-size:15px;font-weight:900;color:#F59E0B;margin:10px 0">Score: '+gg('m6_quiz')+'</div>';
  h+='<div class="lbl">📊 Self-Assessment</div>';
  var rd=g('m6_radar');
  if(rd&&rd['Decomposition']){h+='<div class="rd-wrap" id="radarWrap"></div>'}
  else{h+='<div class="txt em">(Not completed)</div>'}
  h+='<div class="lbl">💬 Reflection</div><div class="txt'+(g('m6_reflect1')?'':' em')+'">'+gg('m6_reflect1')+'</div><div class="txt'+(g('m6_reflect2')?'':' em')+'">'+gg('m6_reflect2')+'</div><div class="txt'+(g('m6_reflect3')?'':' em')+'">'+gg('m6_reflect3')+'</div>';
  h+='</div></div>';

  document.getElementById('body').innerHTML=h;

  // Draw radar SVG
  var rd=g('m6_radar');
  if(rd&&rd['Decomposition']){
    var rl=['Decomposition','Pattern Recognition','Abstraction','Algorithm Design'];
    var vals=[parseInt(rd[rl[0]])||5,parseInt(rd[rl[1]])||5,parseInt(rd[rl[2]])||5,parseInt(rd[rl[3]])||5];
    var W=260,H=260,cx=130,cy=130,R=85;
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
    for(var lv=1;lv<=5;lv++){var lr=(lv/5)*R;var pts=[];for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;pts.push((cx+lr*Math.cos(a)).toFixed(1)+','+(cy+lr*Math.sin(a)).toFixed(1))}svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#E5E7EB" stroke-width="1"/>'}
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(a)).toFixed(1)+'" y2="'+(cy+R*Math.sin(a)).toFixed(1)+'" stroke="#D1D5DB" stroke-width="1"/>'}
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var lx=cx+(R+22)*Math.cos(a),ly=cy+(R+22)*Math.sin(a);svg+='<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" text-anchor="middle" font-size="11" font-family="Noto Sans TC" fill="#6B7280">'+rl[i]+'</text>'}
    var dps=[];for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var v=vals[i]/10;dps.push((cx+R*v*Math.cos(a)).toFixed(1)+','+(cy+R*v*Math.sin(a)).toFixed(1))}
    svg+='<polygon points="'+dps.join(' ')+'" fill="rgba(59,130,246,0.25)" stroke="#3B82F6" stroke-width="2"/>';
    for(var i=0;i<4;i++){var a=(Math.PI*2*i/4)-Math.PI/2;var v=vals[i]/10;svg+='<circle cx="'+(cx+R*v*Math.cos(a)).toFixed(1)+'" cy="'+(cy+R*v*Math.sin(a)).toFixed(1)+'" r="3" fill="#3B82F6"/>'}
    svg+='</svg>';
    document.getElementById('radarWrap').innerHTML=svg;
    applyI18n(document.body);
  }

  // Print
  window.doPrint=function(){
    var ws=document.getElementById('wsRoot');
    var hmm=Math.ceil(ws.scrollHeight*0.2646)+10;
    var style=document.createElement('style');
    style.id='ps';style.textContent='@page{size:210mm '+hmm+'mm;margin:0}';
    document.head.appendChild(style);
    window.print();
    setTimeout(function(){var el=document.getElementById('ps');if(el)el.remove()},1000);
  };
  if(window.location.search.indexOf('print=1')!==-1){setTimeout(doPrint,600)}
})();
</script>
</body>
</html>
